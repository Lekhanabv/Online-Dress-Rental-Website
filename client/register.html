<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | OutfitVault</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="site-header">
        <div class="navbar">
            <a href="index.html" class="site-title">OutfitVault</a>
        </div>
    </header>

    <main>
        <section class="auth-card fade-in">
            <div class="panel-body">
                <p class="section-subtitle">Join OutfitVault</p>
                <h2>Create your account</h2>
                <form id="registerForm" class="form-grid" onsubmit="return false;">
                    <div class="form-group">
                        <label for="registerRole">Account type</label>
                        <select id="registerRole" required>
                            <option value="customer">Customer</option>
                            <option value="vendor">Vendor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Jane Doe" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
                <p style="margin-top: 16px; color: var(--muted);">Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </section>
    </main>

    <footer class="footer">Start renting premium dresses in minutes.</footer>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
