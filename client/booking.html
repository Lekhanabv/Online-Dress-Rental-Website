<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking | OutfitVault</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="site-header">
        <div class="navbar">
            <a href="index.html" class="site-title">OutfitVault</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="browse.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="vendor-dashboard.html">Vendor</a>
                <a href="admin-dashboard.html">Admin</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="btn-secondary">Sign Up</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="booking-panel fade-in">
            <div class="panel-body">
                <p class="section-subtitle">Confirm your booking</p>
                <h2>Reserve your dress</h2>
                <div id="selectedDress" style="margin-bottom: 24px; color: var(--muted);"></div>
                <form id="bookingForm" class="form-grid" onsubmit="return false;">
                    <div class="form-group">
                        <label for="date">Rental Date</label>
                        <input type="date" id="date" name="date" required />
                    </div>
                    <div class="form-group">
                        <label for="duration">Duration (days)</label>
                        <input type="number" id="duration" name="duration" min="1" value="1" required />
                    </div>
                    <div class="form-group">
                        <label for="occasion">Occasion</label>
                        <select id="occasion">
                            <option>Gala night</option>
                            <option>Wedding</option>
                            <option>Bachelorette</option>
                            <option>Birthday</option>
                        </select>
                    </div>
                    <div class="form-group booking-summary">
                        <div>
                            <p class="muted">Price per day</p>
                            <p class="price" id="bookingPrice">$0</p>
                        </div>
                        <div>
                            <p class="muted">Total estimate</p>
                            <p class="total-price" id="bookingTotal">$0</p>
                        </div>
                    </div>
                    <button type="submit" class="btn">Confirm Booking</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">A seamless booking experience for every rental.</footer>
    <script src="js/main.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
