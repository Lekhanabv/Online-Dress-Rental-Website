<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment | OutfitVault</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="site-header">
        <div class="navbar">
            <a href="index.html" class="site-title">OutfitVault</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="browse.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="vendor-dashboard.html">Vendor</a>
                <a href="admin-dashboard.html">Admin</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="btn-secondary">Sign Up</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="payment-panel fade-in">
            <div class="panel-body">
                <p class="section-subtitle">Secure payment</p>
                <h2>Complete your order</h2>
                <div class="booking-summary" style="margin-bottom: 24px;">
                    <div>
                        <p class="muted">Selected dress</p>
                        <p id="paymentDress">Velvet Evening Dress</p>
                    </div>
                    <div>
                        <p class="muted">Amount</p>
                        <p class="price" id="paymentAmount">$120</p>
                    </div>
                </div>
                <form id="paymentForm" class="form-grid" onsubmit="return false;">
                    <div class="form-group">
                        <label for="cardName">Cardholder name</label>
                        <input type="text" id="cardName" placeholder="Jane Doe" required />
                    </div>
                    <div class="form-group">
                        <label for="cardNumber">Card number</label>
                        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required />
                    </div>
                    <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 18px;">
                        <div class="form-group">
                            <label for="expiry">Expiry</label>
                            <input type="text" id="expiry" placeholder="MM/YY" required />
                        </div>
                        <div class="form-group">
                            <label for="cvv">CVV</label>
                            <input type="text" id="cvv" placeholder="123" required />
                        </div>
                    </div>
                    <button type="submit" class="btn">Pay Now</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">Fast and elegant checkout for your rental.</footer>
    <script src="js/main.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
