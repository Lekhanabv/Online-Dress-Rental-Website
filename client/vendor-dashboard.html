<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Dashboard | OutfitVault</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="site-header">
        <div class="navbar">
            <a href="index.html" class="site-title">OutfitVault</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="browse.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="vendor-dashboard.html">Vendor</a>
                <a href="admin-dashboard.html">Admin</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="btn-secondary">Sign Up</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section-title fade-in">
            <div>
                <h2>Vendor Dashboard</h2>
                <p class="section-subtitle">Monitor your inventory, rentals, and vendor performance.</p>
            </div>
        </section>

        <section class="stats-grid fade-in" style="margin-bottom: 32px;">
            <article class="stat-card card">
                <div class="panel-body">
                    <h2>128</h2>
                    <p>Active listings</p>
                </div>
            </article>
            <article class="stat-card card">
                <div class="panel-body">
                    <h2>24</h2>
                    <p>Current rentals</p>
                </div>
            </article>
            <article class="stat-card card">
                <div class="panel-body">
                    <h2>4.9</h2>
                    <p>Vendor rating</p>
                </div>
            </article>
        </section>

        <section class="card fade-in vendor-panel">
            <div class="panel-body">
                <h3>Quick actions</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 14px; margin-top: 20px;">
                    <a href="manage-dresses.html" class="btn">Manage Dresses</a>
                    <a href="vendor-orders.html" class="btn-secondary">View Orders</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">A polished vendor workspace for rentals and inventory.</footer>
    <script src="js/main.js"></script>
    <script src="js/vendor.js"></script>
</body>
</html>
