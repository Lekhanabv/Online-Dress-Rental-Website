<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Dresses | OutfitVault</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="site-header">
        <div class="navbar">
            <a href="index.html" class="site-title">OutfitVault</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="browse.html">Browse</a>
                <a href="orders.html">My Orders</a>
                <a href="vendor-dashboard.html">Vendor</a>
                <a href="admin-dashboard.html">Admin</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="btn-secondary">Sign Up</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section-title fade-in">
            <div>
                <h2>Discover dresses</h2>
                <p class="section-subtitle">Filter by style, price, and event to find the perfect look.</p>
            </div>
        </section>

        <div class="details-grid fade-in">
            <section class="filter-panel">
                <div class="panel-body">
                    <h3>Filter</h3>
                    <div class="form-group">
                        <label for="searchQuery">Search</label>
                        <input id="searchQuery" type="text" placeholder="Search dresses..." />
                    </div>
                    <div class="form-group">
                        <label for="categorySelect">Category</label>
                        <select id="categorySelect">
                            <option value="all">All</option>
                            <option value="Evening">Evening gowns</option>
                            <option value="Cocktail">Cocktail</option>
                            <option value="Bridal">Bridal</option>
                            <option value="Party">Party</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="priceRange">Max price per day</label>
                        <input id="priceRange" type="number" min="30" value="150" />
                    </div>
                    <button id="applyFilters" class="btn">Apply filters</button>
                </div>
            </section>

            <section>
                <div class="section-title">
                    <div>
                        <h2>Available Dresses</h2>
                        <p class="section-subtitle">Stylish rental options from trusted vendors.</p>
                    </div>
                </div>
                <section id="dressList" class="card-grid"></section>
            </section>
        </div>
    </main>

    <footer class="footer">Browse premium dresses with effortless discovery and responsive styling.</footer>
    <script src="js/main.js"></script>
    <script src="js/dresses.js"></script>
</body>
</html>
